# Reference deployment for the netbox-enterprise-sync orchestrator.
#
# Runs as a single container on any host with TCP reachability to both
# Postgres servers. NetBox itself does not interact with this container —
# the orchestrator only talks to the databases.

services:

  netbox-sync:
    build:
      context: .
    image: netbox-enterprise-sync:latest
    container_name: netbox-sync
    restart: unless-stopped

    ports:
      # Control API + dashboard. Expose only on a private interface.
      - "127.0.0.1:9911:9911"

    volumes:
      # Live config — `POST /reverse` rewrites this file in place
      - ./config.yaml:/etc/netbox-sync/config.yaml
      # Persistent orchestrator state (enabled flag, cycle log, staging dump)
      - netbox-sync-state:/var/lib/netbox-sync

    # First cycle is PAUSED by default — call POST /resume (or click Resume
    # in the dashboard) to start syncing. Set INITIAL_ENABLED=true to start
    # enabled instead, but be aware the first cycle drops+recreates the
    # target database.
    # environment:
    #   INITIAL_ENABLED: "false"

    secrets:
      - source_pg_password
      - target_pg_password
      - api_token
      # Add target_pg_admin_password if your target uses a separate
      # admin role for DROP/CREATE DATABASE (see config.example.yaml).
      # - target_pg_admin_password

volumes:
  netbox-sync-state:

secrets:
  source_pg_password:
    file: ./secrets/source_pg_password
  target_pg_password:
    file: ./secrets/target_pg_password
  api_token:
    file: ./secrets/api_token
